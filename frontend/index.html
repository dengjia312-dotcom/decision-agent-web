<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>帮我做决定</title>
  <script src="config.js"></script>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-w: 256px;
      --accent: #5b5bd6;
      --accent-hover: #4a4ac4;
      --accent-light: #ededfc;
      --bg-page: #f9f9fb;
      --bg-sidebar: #ffffff;
      --bg-main: #ffffff;
      --bg-user: #5b5bd6;
      --bg-assistant: #f3f3f6;
      --border: #e8e8ec;
      --text-1: #111118;
      --text-2: #5c5c72;
      --text-3: #9898ae;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08);
      --radius-msg: 16px;
      --radius-input: 12px;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
                   "Helvetica Neue", sans-serif;
      background: var(--bg-page);
      color: var(--text-1);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== App Shell ===== */
    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-brand {
      padding: 20px 20px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: -0.2px;
    }

    .sidebar-actions {
      padding: 0 12px 12px;
    }

    .btn-new-chat {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      background: none;
      color: var(--text-2);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all .18s;
    }

    .btn-new-chat:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .btn-new-chat svg { flex-shrink: 0; }

    .sidebar-section-label {
      padding: 4px 20px 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 16px;
    }

    .history-item {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-2);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background .15s;
    }

    .history-item:hover { background: var(--bg-page); }
    .history-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-3);
      text-align: center;
    }

    /* ===== Main Area ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-main);
    }

    /* Mobile top bar */
    .mobile-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-main);
    }

    .mobile-bar-brand {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-1);
    }

    .mobile-bar-btn {
      font-size: 13px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 500;
      padding: 4px 8px;
    }

    /* ===== Chat Scroll Area ===== */
    .chat-scroll {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .chat-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 24px 0;
    }

    /* ===== Welcome State ===== */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 48px 24px 32px;
    }

    .welcome-icon {
      width: 56px;
      height: 56px;
      background: var(--accent);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-md);
    }

    .welcome-title {
      font-size: 26px;
      font-weight: 800;
      color: var(--text-1);
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    .welcome-sub {
      font-size: 15px;
      color: var(--text-2);
      line-height: 1.7;
      max-width: 360px;
      margin-bottom: 36px;
    }

    .examples-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 12px;
      align-self: flex-start;
      width: 100%;
      max-width: 480px;
    }

    .examples-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 480px;
    }

    .example-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-page);
      cursor: pointer;
      text-align: left;
      font-size: 14px;
      color: var(--text-2);
      transition: all .18s;
      line-height: 1.5;
    }

    .example-card:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .example-card-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    /* ===== Messages ===== */
    #chat-box {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-bottom: 16px;
    }

    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .msg-row.user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      margin-top: 2px;
    }

    .msg-avatar.ai-avatar {
      background: var(--accent);
    }

    .msg-avatar.user-avatar {
      background: #e8e8ec;
    }

    .msg-bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius-msg);
      font-size: 14.5px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.user .msg-bubble {
      background: var(--bg-user);
      color: #ffffff;
      border-bottom-right-radius: 4px;
      box-shadow: var(--shadow-sm);
    }

    .msg-row.assistant .msg-bubble {
      background: var(--bg-assistant);
      color: var(--text-1);
      border-bottom-left-radius: 4px;
    }

    .msg-row.error .msg-bubble {
      background: #fff1f0;
      color: #c0392b;
      border: 1px solid #fad0cc;
      border-bottom-left-radius: 4px;
    }

    /* Loading dots */
    .loading-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      background: var(--text-3);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: .2s; }
    .loading-dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .5; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* ===== Input Section ===== */
    .input-section {
      padding: 12px 24px 20px;
      background: var(--bg-main);
      border-top: 1px solid var(--border);
    }

    .input-inner {
      max-width: 720px;
      margin: 0 auto;
    }

    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg-page);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-input);
      padding: 10px 12px;
      transition: border-color .18s, box-shadow .18s;
    }

    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,91,214,.08);
    }

    #user-input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      resize: none;
      font-size: 14.5px;
      font-family: inherit;
      color: var(--text-1);
      line-height: 1.6;
      max-height: 140px;
      min-height: 24px;
      overflow-y: auto;
    }

    #user-input::placeholder { color: var(--text-3); }

    #send-btn {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .18s, transform .1s;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #send-btn:active:not(:disabled) { transform: scale(.94); }

    #send-btn:disabled {
      background: #c0c0e0;
      cursor: not-allowed;
    }

    #send-btn svg { pointer-events: none; }

    .input-hint {
      margin-top: 7px;
      font-size: 11.5px;
      color: var(--text-3);
      text-align: center;
    }

    /* ===== Scrollbar ===== */
    .chat-scroll::-webkit-scrollbar { width: 5px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #d4d4e0; border-radius: 4px; }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .mobile-bar { display: flex; }

      .chat-inner { padding: 16px 14px 0; }

      .welcome { padding: 32px 16px 24px; }
      .welcome-title { font-size: 22px; }
      .welcome-icon { width: 48px; height: 48px; font-size: 22px; }

      .msg-bubble { max-width: 85%; font-size: 14px; }

      .input-section { padding: 10px 14px 16px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🎯</div>
      <span class="brand-name">帮我做决定</span>
    </div>

    <div class="sidebar-actions">
      <button class="btn-new-chat" id="new-chat-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        新对话
      </button>
    </div>

    <div class="sidebar-section-label">历史对话</div>
    <div class="history-list" id="history-list">
      <div class="history-item active">当前对话</div>
    </div>

    <div class="sidebar-footer">由 Dify AI 驱动</div>
  </aside>

  <!-- ===== Main ===== -->
  <main class="main">

    <!-- Mobile top bar -->
    <div class="mobile-bar">
      <span class="mobile-bar-brand">🎯 帮我做决定</span>
      <button class="mobile-bar-btn" id="mobile-new-chat-btn">+ 新对话</button>
    </div>

    <!-- Scrollable chat area -->
    <div class="chat-scroll" id="chat-scroll">
      <div class="chat-inner">

        <!-- Welcome / empty state -->
        <div class="welcome" id="welcome">
          <div class="welcome-icon">🎯</div>
          <h1 class="welcome-title">帮我做决定</h1>
          <p class="welcome-sub">把你的困惑告诉我，我来帮你理清思路，给出建议。</p>
          <div class="examples-label">试试这些问题</div>
          <div class="examples-grid">
            <button class="example-card" data-q="今天晚上吃什么更合适？">
              <span class="example-card-icon">🍜</span>
              今天晚上吃什么更合适？
            </button>
            <button class="example-card" data-q="今晚应该去健身还是休息？">
              <span class="example-card-icon">🏋️</span>
              今晚应该去健身还是休息？
            </button>
            <button class="example-card" data-q="我今晚3小时应该先改简历还是背英语？">
              <span class="example-card-icon">📚</span>
              我今晚3小时应该先改简历还是背英语？
            </button>
          </div>
        </div>

        <!-- Chat messages inserted here -->
        <div id="chat-box"></div>

      </div>
    </div>

    <!-- Fixed input area -->
    <div class="input-section">
      <div class="input-inner">
        <div class="input-box">
          <textarea
            id="user-input"
            rows="1"
            placeholder="输入你的问题，Ctrl+Enter 发送…"
          ></textarea>
          <button id="send-btn" title="发送 (Ctrl+Enter)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M14 8L2 2l3 6-3 6 12-6z" fill="currentColor"/>
            </svg>
          </button>
        </div>
        <div class="input-hint">Ctrl + Enter 发送 &nbsp;·&nbsp; Enter 换行</div>
      </div>
    </div>

  </main>
</div>

<script>
  // ===== Config =====
  const API_BASE = window.APP_API_BASE_URL || 'http://localhost:3000';

  // ===== State =====
  let conversationId = '';
  let isLoading = false;

  // ===== DOM =====
  const chatBox      = document.getElementById('chat-box');
  const chatScroll   = document.getElementById('chat-scroll');
  const welcome      = document.getElementById('welcome');
  const userInput    = document.getElementById('user-input');
  const sendBtn      = document.getElementById('send-btn');
  const newChatBtn   = document.getElementById('new-chat-btn');
  const mobileNewBtn = document.getElementById('mobile-new-chat-btn');

  // ===== Helpers =====
  function hideWelcome() {
    if (welcome) welcome.style.display = 'none';
  }

  function scrollToBottom() {
    chatScroll.scrollTo({ top: chatScroll.scrollHeight, behavior: 'smooth' });
  }

  function setLoading(on) {
    isLoading = on;
    sendBtn.disabled = on;
    userInput.disabled = on;
  }

  // Auto-resize textarea
  function resizeInput() {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
  }

  // ===== Render message =====
  function appendMessage(role, content) {
    hideWelcome();

    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    // Avatar
    const avatar = document.createElement('div');
    avatar.className = `msg-avatar ${role === 'user' ? 'user-avatar' : 'ai-avatar'}`;
    avatar.textContent = role === 'user' ? '你' : '🎯';

    // Bubble
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    if (role === 'loading') {
      bubble.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
      avatar.textContent = '🎯';
      avatar.className = 'msg-avatar ai-avatar';
      row.className = 'msg-row assistant';
    } else {
      bubble.textContent = content;
    }

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatBox.appendChild(row);
    scrollToBottom();
    return { row, bubble };
  }

  // ===== Send =====
  async function sendMessage(query) {
    query = (query || userInput.value).trim();
    if (!query || isLoading) return;

    userInput.value = '';
    resizeInput();
    setLoading(true);

    appendMessage('user', query);
    const { row: loadingRow } = appendMessage('loading', '');

    try {
      const res = await fetch(`${API_BASE}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, conversation_id: conversationId }),
      });

      const data = await res.json();
      loadingRow.remove();

      if (!res.ok) {
        appendMessage('error', data.error || '现在服务有点忙，请稍后再试。');
        return;
      }

      conversationId = data.conversation_id || conversationId;
      appendMessage('assistant', data.answer);
    } catch {
      loadingRow.remove();
      appendMessage('error', '当前连接异常，请刷新后重试。');
    } finally {
      setLoading(false);
      userInput.focus();
    }
  }

  // ===== New Chat =====
  function startNewChat() {
    conversationId = '';
    chatBox.innerHTML = '';
    if (welcome) welcome.style.display = '';
    userInput.value = '';
    resizeInput();
    userInput.focus();
  }

  // ===== Events =====
  sendBtn.addEventListener('click', () => sendMessage());

  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      sendMessage();
    }
  });

  userInput.addEventListener('input', resizeInput);

  newChatBtn.addEventListener('click', startNewChat);
  mobileNewBtn.addEventListener('click', startNewChat);

  // Example cards
  document.querySelectorAll('.example-card').forEach((card) => {
    card.addEventListener('click', () => {
      sendMessage(card.dataset.q);
    });
  });

  // Init focus
  userInput.focus();
</script>
</body>
</html>
