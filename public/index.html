<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>帮我做决定</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    header {
      text-align: center;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
    }

    header p {
      margin-top: 8px;
      font-size: 15px;
      color: #666;
    }

    /* 聊天记录区域 */
    #chat-box {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      min-height: 400px;
      max-height: 60vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #4f46e5;
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #f0f0f0;
      color: #1a1a1a;
      border-bottom-left-radius: 3px;
    }

    .message.error {
      align-self: flex-start;
      background: #fee2e2;
      color: #b91c1c;
      border-bottom-left-radius: 3px;
    }

    .message.loading {
      align-self: flex-start;
      background: #f0f0f0;
      color: #999;
      font-style: italic;
      border-bottom-left-radius: 3px;
    }

    /* 输入区域 */
    .input-area {
      display: flex;
      gap: 8px;
      background: #fff;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    #user-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 15px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    #user-input:focus {
      border-color: #4f46e5;
    }

    #send-btn {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-end;
      white-space: nowrap;
    }

    #send-btn:hover {
      background: #4338ca;
    }

    #send-btn:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }

    /* 新对话按钮 */
    .toolbar {
      display: flex;
      justify-content: flex-end;
    }

    #new-chat-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }

    #new-chat-btn:hover {
      border-color: #4f46e5;
      color: #4f46e5;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>帮我做决定</h1>
      <p>把你的困惑告诉我，我来帮你理清思路、给出建议。</p>
    </header>

    <div class="toolbar">
      <button id="new-chat-btn">+ 新对话</button>
    </div>

    <div id="chat-box">
      <!-- 消息动态插入到这里 -->
    </div>

    <div class="input-area">
      <textarea
        id="user-input"
        rows="2"
        placeholder="输入你的问题，例如：我该换工作吗？"
      ></textarea>
      <button id="send-btn">发送</button>
    </div>
  </div>

  <script>
    // 保存当前会话 ID，实现连续对话
    let conversationId = '';

    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const newChatBtn = document.getElementById('new-chat-btn');

    // 追加一条消息到聊天记录
    function appendMessage(role, text) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    // 发送消息
    async function sendMessage() {
      const query = userInput.value.trim();
      if (!query) return;

      // 显示用户消息
      appendMessage('user', query);
      userInput.value = '';
      sendBtn.disabled = true;

      // 显示加载占位
      const loadingEl = appendMessage('loading', '正在思考中…');

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query,
            conversation_id: conversationId,
          }),
        });

        const data = await response.json();

        // 移除加载提示
        loadingEl.remove();

        if (!response.ok) {
          appendMessage('error', '出错了：' + (data.error || '未知错误'));
          return;
        }

        // 保存 conversation_id 以支持连续对话
        conversationId = data.conversation_id || conversationId;

        appendMessage('assistant', data.answer);
      } catch (err) {
        loadingEl.remove();
        appendMessage('error', '网络错误，请检查后端是否已启动。');
        console.error(err);
      } finally {
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    // 点击发送按钮
    sendBtn.addEventListener('click', sendMessage);

    // 按 Ctrl+Enter 发送（Enter 换行）
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        sendMessage();
      }
    });

    // 新对话：清空记录和 conversation_id
    newChatBtn.addEventListener('click', () => {
      conversationId = '';
      chatBox.innerHTML = '';
      userInput.focus();
    });
  </script>
</body>
</html>
